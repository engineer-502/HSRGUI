<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HSR Chat Skin</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <h1>HSR Chat Skin</h1>
        <p>ChatGPT + Gemini Star Rail character catalog</p>
      </header>

      <section class="group">
        <div class="site-tabs" role="tablist" aria-label="Target site">
          <button id="siteTabChatGPT" type="button" class="site-tab" role="tab" data-site-key="chatgpt">
            ChatGPT
          </button>
          <button id="siteTabGemini" type="button" class="site-tab" role="tab" data-site-key="gemini">
            Gemini
          </button>
        </div>
      </section>

      <section class="group">
        <label class="row toggle-row" for="enabledToggle">
          <span>Enabled</span>
          <input id="enabledToggle" type="checkbox" />
        </label>
      </section>

      <section class="group">
        <label for="splitInput">Split Max Chars</label>
        <input id="splitInput" type="number" min="160" max="320" step="5" />

        <label for="userNameInput">My Name</label>
        <input id="userNameInput" type="text" maxlength="24" placeholder="오공이" />

        <label for="headerTitleInput">Header Title</label>
        <input id="headerTitleInput" type="text" maxlength="24" placeholder="오공열차" />

        <label for="headerSubtitleInput">Header Subtitle</label>
        <input id="headerSubtitleInput" type="text" maxlength="36" placeholder="인간개조의 용광로" />
      </section>

      <section class="group">
        <div class="row section-head">
          <label for="characterSearchInput">Assistant Character</label>
          <span id="characterCount" class="meta-note"></span>
        </div>
        <input id="characterSearchInput" type="text" maxlength="40" placeholder="이름 검색..." />

        <article id="selectedCharacterCard" class="character-card" aria-live="polite">
          <img id="selectedCharacterIcon" class="character-card-icon" src="" alt="" />
          <div class="character-card-body">
            <div class="character-card-top">
              <strong id="selectedCharacterName"></strong>
              <span id="selectedCharacterStatus" class="status-pill"></span>
            </div>
            <p id="selectedCharacterSubtitle" class="character-card-subtitle"></p>
          </div>
        </article>

        <div id="characterList" class="character-list" role="list"></div>
      </section>

      <section class="group">
        <div class="row section-head">
          <label for="promptPreview">Persona Prompt</label>
          <span id="promptState" class="meta-note"></span>
        </div>
        <textarea id="promptPreview" rows="10" readonly></textarea>
        <p class="helper">
          Prompt source baseline: HoYoWiki, HoYoLAB official character materials, Fandom lore supplement.
        </p>
        <button id="copyPromptButton" type="button">프롬프트 복사</button>
      </section>

      <section class="group actions">
        <button id="openPreview" type="button">Open Preview</button>
        <button id="resetButton" type="button" class="secondary">Reset Defaults</button>
      </section>

      <footer class="footer">
        Applies to: <code>chatgpt.com</code>, <code>chat.openai.com</code>, <code>gemini.google.com</code>
      </footer>
    </main>

    <script src="../shared/stickerCharacterPacks.js"></script>
    <script src="../shared/characterCatalog.js"></script>
    <script src="../shared/config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
